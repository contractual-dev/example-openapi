openapi: 3.0.3
info:
  title: Petstore API
  description: A simple API for managing a pet store
  version: 1.0.0
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  contact:
    name: API Support
    email: support@petstore.example.com

servers:
  - url: https://api.petstore.io/v1
    description: Production server

security:
  - ApiKeyAuth: []

paths:
  /pets:
    get:
      summary: List all pets
      description: Returns a list of all pets in the store
      operationId: listPets
      tags:
        - pets
      parameters:
        - name: limit
          in: query
          description: Maximum number of pets to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a pet
      description: Add a new pet to the store
      operationId: createPet
      tags:
        - pets
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewPet'
      responses:
        '201':
          description: Pet created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'



components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    Pet:
      type: object
      required:
        - id
        - name
        - species
        - status
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the pet
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the pet
        species:
          type: string
          enum:
            - dog
            - cat
            - rabbit
          description: Species of the pet
        breed:
          type: string
          maxLength: 50
          description: Breed of the pet (optional)
        age:
          type: integer
          minimum: 0
          maximum: 50
          description: Age of the pet in years (optional)
        color:
          type: string
          maxLength: 30
          description: Color of the pet (optional)
        weight:
          type: number
          minimum: 0
          description: Weight of the pet in kilograms (optional)
        microchipId:
          type: string
          pattern: '^[0-9]{15}$'
          description: 15-digit microchip ID (optional)
        status:
          type: string
          enum:
            - available
            - pending
            - sold
          description: Availability status of the pet
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the pet was added

    NewPet:
      type: object
      required:
        - name
        - species
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: Name of the pet
        species:
          type: string
          enum:
            - dog
            - cat
            - rabbit
          description: Species of the pet
        breed:
          type: string
          maxLength: 50
          description: Breed of the pet (optional)
        age:
          type: integer
          minimum: 0
          maximum: 50
          description: Age of the pet in years (optional)

    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          description: Additional error details (optional)
